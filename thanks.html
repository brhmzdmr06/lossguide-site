<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | LossGuide</title>

  <style>
    :root{
      --green:#2D4A3E;
      --cream:#F5F0EB;
      --text:#1f2a24;
      --muted:#5f6b64;
      --line:#e3ddd6;
      --white:#ffffff;
    }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:var(--cream);
      color:var(--text);
    }

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .card{
      max-width:640px;
      width:100%;
      background:var(--white);
      padding:40px 30px;
      border-radius:16px;
      border:1px solid var(--line);
      text-align:center;
    }

    h1{
      color:var(--green);
      margin-bottom:10px;
      font-size:34px;
    }

    p{
      color:var(--muted);
      font-size:17px;
      line-height:1.6;
      margin-bottom:12px;
    }

    .btn{
      display:inline-block;
      margin-top:25px;
      padding:14px 22px;
      border-radius:999px;
      text-decoration:none;
      font-weight:600;
      font-size:16px;
    }

    .primary{
      background:var(--green);
      color:#fff;
    }

    .secondary{
      display:block;
      margin-top:12px;
      color:var(--green);
      font-size:14px;
      text-decoration:none;
    }

  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <h1>Thank you</h1>

      <p>Your free checklist is ready.</p>

      <p>
        This guide will help you take the first practical steps after a death in the UK,
        clearly and without overwhelm.
      </p>

      <!-- PDF BUTTON -->
      <a href="/lossguide-free-checklist.pdf" class="btn primary" download>
        Download Free Checklist
      </a>

      <!-- BACK -->
      <a href="/" class="secondary">
        Back to homepage
      </a>

    </div>
  </div>
</body>
</html>
