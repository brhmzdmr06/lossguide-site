<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | LossGuide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand: #2D4A3E;
      --brand-lt: #3A5D4F;
      --muted: #5F6D66;
      --line: #DED6CF;
      --text: #1F2A25;
      --bg: #F5F0EB;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 18px 24px;
      border-bottom: 1px solid rgba(45,74,62,0.08);
      background: rgba(245,240,235,0.9);
      backdrop-filter: blur(8px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      text-decoration: none;
    }

    .brand-mark {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--brand);
      color: #fff;
      display: grid;
      place-items: center;
      font-family: "Playfair Display", serif;
      font-size: 16px;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(45,74,62,0.09);
    }

    .check-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(45,74,62,0.1);
      display: grid;
      place-items: center;
      margin: 0 auto 24px;
    }

    .check-circle svg { width: 36px; height: 36px; }

    h1 {
      font-family: "Playfair Display", serif;
      font-size: 1.9rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 32px;
      max-width: 40ch;
      margin-left: auto;
      margin-right: auto;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 300px;
      min-height: 52px;
      border-radius: 999px;
      background: var(--brand);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 10px 28px rgba(45,74,62,0.22);
      transition: 0.2s ease;
      margin-bottom: 16px;
    }

    .download-btn:hover {
      background: var(--brand-lt);
      transform: translateY(-1px);
    }

    .download-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .meta-note {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .back-link {
      display: block;
      color: var(--brand);
      font-size: 0.9rem;
      text-decoration: none;
      margin-top: 4px;
    }

    .back-link:hover { text-decoration: underline; }

    footer {
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      border-top: 1px solid rgba(45,74,62,0.06);
    }

    footer a { color: var(--brand); text-decoration: none; }

    @media (max-width: 480px) {
      .card { padding: 32px 20px; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="brand">
      <span class="brand-mark">L</span>
      LossGuide
    </a>
  </header>

  <main>
    <div class="card">

      <div class="check-circle">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="18" fill="#2D4A3E" fill-opacity="0.12"/>
          <path d="M11 18.5L15.5 23L25 13" stroke="#2D4A3E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h1>Thank you</h1>

      <p class="subtitle">
        Your free checklist is ready to download. It covers the key practical steps
        after a death in the UK, clearly and without overwhelm.
      </p>

      <a href="checklist.pdf" download="LossGuide_Free_Checklist.pdf" class="download-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download free checklist
      </a>

      <p class="meta-note">PDF · Free · No account needed</p>

      <a href="index.html" class="back-link">← Back to homepage</a>

    </div>
  </main>

  <footer>
    © 2026 LossGuide · <a href="index.html">Home</a>
  </footer>

</body>
</html>
