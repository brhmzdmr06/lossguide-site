<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful | LossGuide</title>
  <meta name="description" content="Your payment was successful." />
  <style>
    :root {
      --bg: #f5f0eb;
      --panel: #ffffff;
      --text: #1f2a25;
      --muted: #5f6d66;
      --brand: #2d4a3e;
      --line: #ded6cf;
      --shadow: 0 10px 30px rgba(24, 35, 30, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8f4ef 0%, #f5f0eb 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 40px;
      text-align: center;
    }

    .badge {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      background: rgba(45, 74, 62, 0.12);
      color: var(--brand);
      font-size: 32px;
      font-weight: bold;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 2rem;
      color: var(--brand);
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1.05rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
    }

    .btn-secondary {
      border-color: rgba(45, 74, 62, 0.18);
      color: var(--brand);
      background: transparent;
    }

    .note {
      margin-top: 20px;
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">✓</div>
    <h1>Payment successful</h1>
    <p>Thank you. Your order has been received successfully.</p>
    <p>You can now continue and access the next steps for LossGuide.</p>

    <div class="actions">
      <a href="/checklist.html" class="btn btn-primary">Back to homepage</a>
      <a href="mailto:hello@lossguide.co.uk" class="btn btn-secondary">Contact support</a>
    </div>

    <div class="note">
      If you do not receive your access details, please contact support.
    </div>
  </div>
</body>
</html>
