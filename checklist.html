<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Checklist | LossGuide</title>

<style>
body {
  font-family: Arial;
  background:#f5f0eb;
  margin:0;
  padding:40px;
}

.container {
  max-width:800px;
  margin:auto;
}

.card {
  background:#fff;
  padding:30px;
  border-radius:15px;
}

h1 { color:#2d4a3e; }

.task {
  display:flex;
  gap:10px;
  margin:15px 0;
}

input { transform: scale(1.3); }
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>Your Step-by-Step Checklist</h1>

    <div class="task">
      <input type="checkbox"> Register the death
    </div>

    <div class="task">
      <input type="checkbox"> Inform Tell Us Once service
    </div>

    <div class="task">
      <input type="checkbox"> Notify banks and finances
    </div>

    <div class="task">
      <input type="checkbox"> Cancel bills and subscriptions
    </div>

    <div class="task">
      <input type="checkbox"> Check probate requirements
    </div>

  </div>
</div>

</body>
</html>
